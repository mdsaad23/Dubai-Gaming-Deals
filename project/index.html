// ─── CIRCUIT BACKGROUND ───────────────────────────────────────────────────
// PCB paths follow the 4.8.8 Islamic tiling (regular octagons + squares)
// the same geometry found in mosque tile-work and UAE architectural screens.
// Signal tracers are round glowing dots with a fading trail.
const CircuitBackground = () => {
  const cvRef = useRef(null);
  useEffect(() => {
    const cv = cvRef.current;
    const ctx = cv.getContext('2d');
    let animId, nodes = [], edges = [];

    const SIDE = 44;                               // octagon side length px
    const T    = SIDE * (2 + Math.SQRT2);          // tile period ≈ 150px
    const R    = SIDE / (2 * Math.sin(Math.PI/8)); // circumradius ≈ 57.5px

    const build = () => {
      nodes = []; edges = [];
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
      const cols = Math.ceil(cv.width  / T) + 2;
      const rows = Math.ceil(cv.height / T) + 2;

      // Place 8 vertices for each octagon tile (flat-top orientation, 22.5° offset)
      for (let r = -1; r <= rows; r++) {
        for (let c = -1; c <= cols; c++) {
          const cx = c * T, cy = r * T;
          for (let k = 0; k < 8; k++) {
            const ang = Math.PI / 8 + k * Math.PI / 4;
            nodes.push({ x: cx + R * Math.cos(ang), y: cy + R * Math.sin(ang) });
          }
        }
      }

      // Connect node pairs within SIDE*1.05 — captures ONLY octagon edges +
      // the horizontal/vertical square edges that tile the gaps. Diagonal
      // shortcuts (length SIDE*√2 ≈ 62px) exceed the threshold and are skipped.
      const maxD2 = (SIDE * 1.05) ** 2;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[j].x - nodes[i].x;
          const dy = nodes[j].y - nodes[i].y;
          if (dx * dx + dy * dy < maxD2) edges.push([i, j]);
        }
      }
    };
    build();
    window.addEventListener('resize', build);

    const sigs = [];
    let hueBase = 140;

    const spawn = () => {
      if (sigs.length >= 22 || !edges.length) return;
      const [a, b] = edges[Math.floor(Math.random() * edges.length)];
      sigs.push({
        a, b, p: 0,
        spd: 0.0035 + Math.random() * 0.006,
        hue: ((hueBase + (Math.random() - 0.5) * 100) + 360) % 360,
        rev: Math.random() > 0.5,
      });
    };

    const draw = () => {
      hueBase = (hueBase + 0.09) % 360;
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Dim base traces — the Islamic tiling geometry
      ctx.lineWidth = 0.85;
      for (const [ai, bi] of edges) {
        const a = nodes[ai], b = nodes[bi];
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = `hsla(${hueBase},85%,55%,0.05)`;
        ctx.stroke();
      }

      // Small 8-pointed star at each junction node (Khatam motif)
      for (const n of nodes) {
        ctx.beginPath();
        for (let i = 0; i < 16; i++) {
          const ang = (i * Math.PI / 8) - Math.PI / 2;
          const r = i % 2 === 0 ? 2.8 : 1.1;
          const px = n.x + r * Math.cos(ang);
          const py = n.y + r * Math.sin(ang);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = `hsla(${hueBase},85%,62%,0.065)`;
        ctx.fill();
      }

      if (Math.random() < 0.06) spawn();

      for (let i = sigs.length - 1; i >= 0; i--) {
        const s = sigs[i];
        s.p += s.spd;
        if (s.p >= 1) { sigs.splice(i, 1); continue; }

        const a = nodes[s.a], b = nodes[s.b];
        // Head always leads — trail lags behind in direction of travel
        const t  = s.rev ? 1 - s.p : s.p;
        const t0 = s.rev ? Math.min(1, t + 0.28) : Math.max(0, t - 0.28);

        const x  = a.x + (b.x - a.x) * t,  y  = a.y + (b.y - a.y) * t;
        const x0 = a.x + (b.x - a.x) * t0, y0 = a.y + (b.y - a.y) * t0;

        // Fading trail
        const trail = ctx.createLinearGradient(x0, y0, x, y);
        trail.addColorStop(0, `hsla(${s.hue},100%,60%,0)`);
        trail.addColorStop(1, `hsla(${s.hue},100%,65%,0.7)`);
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x, y);
        ctx.lineWidth = 1.6; ctx.strokeStyle = trail; ctx.stroke();

        // Round glowing signal head
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 12);
        grd.addColorStop(0,    `hsla(${s.hue},100%,90%,1)`);
        grd.addColorStop(0.35, `hsla(${s.hue},100%,65%,0.5)`);
        grd.addColorStop(1,    `hsla(${s.hue},100%,50%,0)`);
        ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fillStyle = grd; ctx.fill();

        // Round node pulse on arrival
        if (t > 0.84) {
          const nd = nodes[s.rev ? s.a : s.b];
          const alpha = (t - 0.84) / 0.16;
          const ng = ctx.createRadialGradient(nd.x, nd.y, 0, nd.x, nd.y, 20);
          ng.addColorStop(0, `hsla(${s.hue},100%,72%,${0.8 * alpha})`);
          ng.addColorStop(1, `hsla(${s.hue},100%,50%,0)`);
          ctx.beginPath(); ctx.arc(nd.x, nd.y, 20, 0, Math.PI * 2);
          ctx.fillStyle = ng; ctx.fill();
        }
      }
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', build); };
  }, []);
  return (
    <canvas ref={cvRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none', zIndex: 0 }} />
  );
};

    </div>
  );

// ─── FILTER SIDEBAR ───────────────────────────────────────────────────────
const FilterSidebar = ({ category, filters, onChange, onReset }) => {
  const FilterSection = ({ title, children }) => {
    const [open, setOpen] = useState(true);
    return (
      <div style={{ borderBottom: '1px solid var(--border)', paddingBottom: 16, marginBottom: 16 }}>
        <button onClick={() => setOpen(!open)} style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'none', color: 'var(--text)', fontSize: 12, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: open ? 12 : 0 }}>
          {title}
          <span style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}><Icon name="chevronDown" size={14} color="var(--text3)" /></span>
        </button>
        {open && children}
      </div>
    );
  };

  const Checkbox = ({ label, checked, onChange }) => (
    <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', padding: '4px 0', fontSize: 13, color: checked ? 'var(--text)' : 'var(--text2)' }}>
      <div style={{ width: 16, height: 16, borderRadius: 4, border: `1.5px solid ${checked ? 'var(--green)' : 'var(--border2)'}`, background: checked ? 'var(--green)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'all 0.15s' }}>
        {checked && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#000" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </div>
      {label}
    </label>
  );

  const RangeFilter = ({ label, min, max, value, onChange }) => {
    const pct = ((value - min) / (max - min)) * 100;
    return (
      <div style={{ marginBottom: 8 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'var(--text2)', marginBottom: 6 }}>
          <span>{label}</span>
          <span style={{ color: 'var(--green)', fontFamily: 'var(--mono)', fontWeight: 600 }}>AED {value.toLocaleString()}</span>
        </div>
        <input type="range" min={min} max={max} value={value} onChange={e => onChange(Number(e.target.value))} step={100}
          style={{ width: '100%', appearance: 'none', height: 3, borderRadius: 2, background: `linear-gradient(to right, var(--green) ${pct}%, var(--border2) ${pct}%)`, outline: 'none' }} />
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--text3)', marginTop: 4 }}>
          <span>AED {min.toLocaleString()}</span><span>AED {max.toLocaleString()}</span>
        </div>
      </div>
    );
  };

  const toggle = (key, val) => {
    const cur = filters[key] || [];
    onChange({ ...filters, [key]: cur.includes(val) ? cur.filter(x => x !== val) : [...cur, val] });
  };
  const isChecked = (key, val) => (filters[key] || []).includes(val);

  if (category === 'laptop') return (
    <div>
      <FilterSection title="Brand">
        {['ASUS', 'MSI', 'Lenovo', 'Acer', 'HP', 'Razer', 'Gigabyte', 'Dell'].map(b => (
          <Checkbox key={b} label={b} checked={isChecked('brand', b)} onChange={() => toggle('brand', b)} />
        ))}
      </FilterSection>
      <FilterSection title="Screen Size">
        {['15.6"', '16"', '16.1"', '17.3"', '18"'].map(s => (
          <Checkbox key={s} label={s} checked={isChecked('screen', s)} onChange={() => toggle('screen', s)} />
        ))}
      </FilterSection>
      <FilterSection title="GPU">
        {['RTX 4090', 'RTX 4080', 'RTX 4070 Ti', 'RTX 4070', 'RTX 4060'].map(g => (
          <Checkbox key={g} label={g} checked={isChecked('gpu', g)} onChange={() => toggle('gpu', g)} />
        ))}
      </FilterSection>
      <FilterSection title="CPU">
        {['Core i9', 'Core i7', 'Core i5', 'Ryzen 9', 'Ryzen 7'].map(c => (
          <Checkbox key={c} label={c} checked={isChecked('cpu', c)} onChange={() => toggle('cpu', c)} />
        ))}
      </FilterSection>
      <FilterSection title="Price Range">
        <RangeFilter label="Max Price" min={1000} max={20000} value={filters.maxPrice || 20000} onChange={v => onChange({ ...filters, maxPrice: v })} />
      </FilterSection>
      <FilterSection title="RAM">
        {['8GB', '16GB', '32GB', '64GB'].map(r => (
          <Checkbox key={r} label={r} checked={isChecked('ram', r)} onChange={() => toggle('ram', r)} />
        ))}
      </FilterSection>
    </div>
  );

  if (category === 'cpu') return (
    <div>
      <FilterSection title="Brand">
        {['Intel', 'AMD'].map(b => (
          <Checkbox key={b} label={b} checked={isChecked('brand', b)} onChange={() => toggle('brand', b)} />
        ))}
      </FilterSection>
      <FilterSection title="Socket">
        {['LGA1700', 'AM5', 'LGA1851'].map(s => (
          <Checkbox key={s} label={s} checked={isChecked('socket', s)} onChange={() => toggle('socket', s)} />
        ))}
      </FilterSection>
      <FilterSection title="Cores">
        {['4-6', '8', '12', '16', '20+'].map(c => (
          <Checkbox key={c} label={c} checked={isChecked('cores', c)} onChange={() => toggle('cores', c)} />
        ))}
      </FilterSection>
      <FilterSection title="Price Range">
        <RangeFilter label="Max Price" min={200} max={5000} value={filters.maxPrice || 5000} onChange={v => onChange({ ...filters, maxPrice: v })} />
      </FilterSection>
    </div>
  );

  if (category === 'gpu') return (
    <div>
      <FilterSection title="Brand">
        {['NVIDIA', 'AMD'].map(b => (
          <Checkbox key={b} label={b} checked={isChecked('brand', b)} onChange={() => toggle('brand', b)} />
        ))}
      </FilterSection>
      <FilterSection title="VRAM">
        {['8GB', '12GB', '16GB', '24GB'].map(v => (
          <Checkbox key={v} label={v} checked={isChecked('vram', v)} onChange={() => toggle('vram', v)} />
        ))}
      </FilterSection>
      <FilterSection title="Series">
        {['RTX 40 Series', 'RTX 30 Series', 'RX 7000', 'RX 6000'].map(s => (
          <Checkbox key={s} label={s} checked={isChecked('series', s)} onChange={() => toggle('series', s)} />
        ))}
      </FilterSection>
      <FilterSection title="Price Range">
        <RangeFilter label="Max Price" min={500} max={10000} value={filters.maxPrice || 10000} onChange={v => onChange({ ...filters, maxPrice: v })} />
      </FilterSection>
    </div>
  );

  return null;
};

// ─── PRODUCT DETAIL MODAL ─────────────────────────────────────────────────
const ProductModal = ({ product, onClose, onAlert }) => {

    const handler = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', handler);

  if (!product) return null;
  const savings = product.originalPrice - product.salePrice;
  const r = RETAILERS[product.retailer];

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, backdropFilter: 'blur(4px)' }}>

              <Icon name="fire" size={11} color="#fff" /> HOT DEAL

          <div style={{ fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)', letterSpacing: '0.06em', textTransform: 'uppercase', marginBottom: 6 }}>{product.brand}</div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                <span style={{ background: 'var(--green)', color: '#000', fontWeight: 700, fontSize: 14, padding: '3px 10px', borderRadius: 5, fontFamily: 'var(--mono)' }}>-{product.discount}% OFF</span>
                <span style={{ color: 'var(--text3)', textDecoration: 'line-through', fontFamily: 'var(--mono)', fontSize: 14 }}>AED {product.originalPrice.toLocaleString()}</span>
              </div>
              <div style={{ fontSize: 32, fontWeight: 700, color: 'var(--green)', fontFamily: 'var(--mono)' }}>AED {product.salePrice.toLocaleString()}</div>
              <div style={{ fontSize: 12, color: 'var(--text3)', marginTop: 4 }}>You save AED {savings.toLocaleString()}</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <button onClick={onClose} style={{ padding: '12px 24px', background: 'var(--green)', border: 'none', borderRadius: 9, fontWeight: 700, fontSize: 14, color: '#000', display: 'flex', alignItems: 'center', gap: 8 }}>
                View on {r.name} <Icon name="external" size={14} color="#000" />
              </button>
              <button onClick={() => { onClose(); onAlert(product); }} style={{ padding: '10px 24px', background: 'var(--surface3)', border: '1px solid var(--border2)', borderRadius: 9, fontSize: 13, color: 'var(--text2)', display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center' }}>
                <Icon name="bell" size={13} /> Set Price Alert
              </button>
            </div>
          </div>

          {/* Tags */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 20 }}>
            {product.tags.map(t => (
              <span key={t} style={{ fontSize: 12, color: 'var(--green)', background: 'var(--green-dim)', border: '1px solid rgba(0,255,136,0.2)', borderRadius: 5, padding: '4px 10px' }}>{t}</span>
            ))}
          </div>

          {/* Specs table */}
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 10 }}>Specifications</div>
          <div style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
            {Object.entries(product.specs).map(([k, v], i) => (
              <div key={k} style={{ display: 'flex', padding: '10px 16px', borderBottom: i < Object.entries(product.specs).length - 1 ? '1px solid var(--border)' : 'none', gap: 16 }}>
                <span style={{ width: 130, flexShrink: 0, fontSize: 12, color: 'var(--text3)', fontFamily: 'var(--mono)', textTransform: 'capitalize' }}>{k.replace(/([A-Z])/g, ' $1').trim()}</span>
                <span style={{ fontSize: 13, color: 'var(--text)', fontWeight: 500 }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── ALERT MODAL ──────────────────────────────────────────────────────────
const AlertModal = ({ product, onClose }) => {
  const [tab, setTab] = useState('email');
  const [emailVal, setEmailVal] = useState('');
  const [waVal, setWaVal] = useState('');
  const [targetPrice, setTargetPrice] = useState(product ? Math.round(product.salePrice * 0.9) : 0);
  const [submitted, setSubmitted] = useState(false);
  const [alertType, setAlertType] = useState('price_drop');

  useEffect(() => {
    const handler = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  if (!product) return null;

  const handleSubmit = () => {
    if (tab === 'email' && !emailVal.includes('@')) return;
    if (tab === 'whatsapp' && waVal.length < 9) return;
    setSubmitted(true);
  };

  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.85)', zIndex: 2000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20, backdropFilter: 'blur(4px)' }}>
      <div onClick={e => e.stopPropagation()} style={{ background: 'var(--surface)', border: '1px solid var(--border2)', borderRadius: 16, width: '100%', maxWidth: 440, padding: 28, position: 'relative' }}>
        <button onClick={onClose} style={{ position: 'absolute', top: 16, right: 16, background: 'var(--surface3)', border: '1px solid var(--border)', borderRadius: 8, padding: 8, color: 'var(--text2)' }}>
          <Icon name="close" size={16} />
        </button>

        {submitted ? (
          <div style={{ textAlign: 'center', padding: '20px 0' }}>
            <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'var(--green-dim2)', border: '2px solid var(--green)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
              <svg width="28" height="22" viewBox="0 0 28 22" fill="none"><path d="M2 11l8 8L26 2" stroke="var(--green)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </div>
            <h3 style={{ fontSize: 20, fontWeight: 700, marginBottom: 8 }}>Alert Set!</h3>
            <p style={{ fontSize: 14, color: 'var(--text2)', lineHeight: 1.6 }}>We'll notify you via {tab === 'email' ? 'email' : 'WhatsApp'} when the price drops{alertType === 'price_drop' ? ` below AED ${targetPrice.toLocaleString()}` : ''}.</p>
            <button onClick={onClose} style={{ marginTop: 20, padding: '10px 28px', background: 'var(--green)', border: 'none', borderRadius: 9, fontWeight: 700, fontSize: 14, color: '#000' }}>Done</button>
          </div>
        ) : (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
              <Icon name="bell" size={20} color="var(--green)" />
              <h3 style={{ fontSize: 18, fontWeight: 700 }}>Price Alert</h3>
            </div>

            <div style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', marginBottom: 20, display: 'flex', gap: 12, alignItems: 'center' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, color: 'var(--text3)', marginBottom: 2, fontFamily: 'var(--mono)' }}>{product.brand}</div>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>{product.model}</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--green)', fontFamily: 'var(--mono)' }}>AED {product.salePrice.toLocaleString()}</div>
              </div>
            </div>

            {/* Alert type */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Alert When</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[{ val: 'price_drop', label: 'Price drops below' }, { val: 'any_change', label: 'Any price change' }].map(opt => (
                  <button key={opt.val} onClick={() => setAlertType(opt.val)} style={{ flex: 1, padding: '8px 4px', borderRadius: 8, border: `1.5px solid ${alertType === opt.val ? 'var(--green)' : 'var(--border2)'}`, background: alertType === opt.val ? 'var(--green-dim)' : 'var(--surface3)', color: alertType === opt.val ? 'var(--green)' : 'var(--text2)', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>

            {alertType === 'price_drop' && (
              <div style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--text2)', textTransform: 'uppercase', letterSpacing: '0.06em' }}>Target Price</span>
                  <span style={{ fontFamily: 'var(--mono)', fontWeight: 700, color: 'var(--green)', fontSize: 14 }}>AED {targetPrice.toLocaleString()}</span>
                </div>
                <input type="range" min={Math.round(product.salePrice * 0.5)} max={product.salePrice} step={50} value={targetPrice} onChange={e => setTargetPrice(Number(e.target.value))}
                  style={{ width: '100%', appearance: 'none', height: 3, borderRadius: 2, background: `linear-gradient(to right, var(--green) ${((targetPrice - product.salePrice*0.5)/(product.salePrice*0.5))*100}%, var(--border2) ${((targetPrice - product.salePrice*0.5)/(product.salePrice*0.5))*100}%)`, outline: 'none' }} />
              </div>
            )}

            {/* Channel tabs */}
            <div style={{ display: 'flex', background: 'var(--surface3)', borderRadius: 10, padding: 3, gap: 3, marginBottom: 14 }}>
              {[{ id: 'email', icon: 'email', label: 'Email' }, { id: 'whatsapp', icon: 'whatsapp', label: 'WhatsApp' }].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: '8px 4px', borderRadius: 8, border: 'none', background: tab === t.id ? 'var(--surface2)' : 'transparent', color: tab === t.id ? 'var(--text)' : 'var(--text3)', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, cursor: 'pointer' }}>
                  <Icon name={t.icon} size={14} color={tab === t.id ? (t.id === 'whatsapp' ? '#25d366' : 'var(--green)') : 'var(--text3)'} />
                  {t.label}
                </button>
              ))}
            </div>

            {tab === 'email' ? (
              <input type="email" placeholder="your@email.com" value={emailVal} onChange={e => setEmailVal(e.target.value)}
                style={{ width: '100%', padding: '12px 14px', background: 'var(--surface3)', border: '1.5px solid var(--border2)', borderRadius: 9, color: 'var(--text)', fontSize: 14, marginBottom: 14, outline: 'none' }}
                onFocus={e => e.target.style.borderColor = 'var(--green)'}
                onBlur={e => e.target.style.borderColor = 'var(--border2)'} />
            ) : (
              <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
                <select style={{ padding: '12px 10px', background: 'var(--surface3)', border: '1.5px solid var(--border2)', borderRadius: 9, color: 'var(--text)', fontSize: 14, outline: 'none' }}>
                  <option>🇦🇪 +971</option>
                  <option>🇸🇦 +966</option>
                  <option>🇶🇦 +974</option>
                  <option>🇰🇼 +965</option>
                </select>
                <input type="tel" placeholder="50 123 4567" value={waVal} onChange={e => setWaVal(e.target.value)}
                  style={{ flex: 1, padding: '12px 14px', background: 'var(--surface3)', border: '1.5px solid var(--border2)', borderRadius: 9, color: 'var(--text)', fontSize: 14, outline: 'none' }}
                  onFocus={e => e.target.style.borderColor = '#25d366'}
                  onBlur={e => e.target.style.borderColor = 'var(--border2)'} />
              </div>
            )}

            <button onClick={handleSubmit} style={{ width: '100%', padding: '13px', background: 'var(--green)', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 15, color: '#000', cursor: 'pointer' }}>
              Set Alert
            </button>
            <p style={{ fontSize: 11, color: 'var(--text3)', textAlign: 'center', marginTop: 10 }}>No spam. Unsubscribe any time.</p>
          </>
        )}
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────
const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [category, setCategory] = useState('all');
  const [filters, setFilters] = useState({});
  const [sort, setSort] = useState('discount');
  const [search, setSearch] = useState('');
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [alertProduct, setAlertProduct] = useState(null);
  const [showFilters, setShowFilters] = useState(true);

  const ac = ACCENTS[t.accent] || ACCENTS.green;
  const dn = DENSITY[t.density] || DENSITY.comfortable;
  const isNeon = t.vibe === 'neon';
  const isTerm = t.vibe === 'terminal';

  // Inject CSS vars + vibe body styles
  useEffect(() => {
    document.documentElement.style.setProperty('--green', ac.hex);
    document.documentElement.style.setProperty('--green-dim', ac.dim);
    document.documentElement.style.setProperty('--green-dim2', ac.dim2);
    document.body.style.fontFamily = isTerm ? "'Space Mono', monospace" : "'Space Grotesk', sans-serif";
    document.body.style.background = isNeon ? '#03020a' : isTerm ? '#030a03' : '#080808';
  }, [t.accent, t.vibe]);

  const vibeCardStyle = isNeon ? {
    boxShadow: `0 0 0 1px ${ac.hex}33, 0 4px 32px ${ac.hex}18`,
    borderColor: `${ac.hex}44`,
  } : isTerm ? {
    borderColor: `${ac.hex}66`,
    borderRadius: 4,
    background: '#050d05',
  } : {};

  const categories = [
    { id: 'all', label: 'All Deals', icon: 'tag' },
    { id: 'laptop', label: 'Gaming Laptops', icon: 'laptop' },
    { id: 'cpu', label: 'CPUs', icon: 'cpu' },
    { id: 'gpu', label: 'GPUs', icon: 'gpu' },
  ];

  const sortOptions = [
    { val: 'discount', label: 'Biggest Discount' },
    { val: 'price_asc', label: 'Price: Low to High' },
    { val: 'price_desc', label: 'Price: High to Low' },
    { val: 'rating', label: 'Top Rated' },
  ];

  const filtered = ALL_PRODUCTS
    .filter(p => category === 'all' || p.category === category)
    .filter(p => {
      if (search) {
        const q = search.toLowerCase();
        return p.brand.toLowerCase().includes(q) || p.model.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
      }
      return true;
    })
    .filter(p => {
      if (filters.brand?.length && !filters.brand.includes(p.brand)) return false;
      if (filters.maxPrice && p.salePrice > filters.maxPrice) return false;
      return true;
    })
    .sort((a, b) => {
      if (sort === 'discount') return b.discount - a.discount;
      if (sort === 'price_asc') return a.salePrice - b.salePrice;
      if (sort === 'price_desc') return b.salePrice - a.salePrice;
      if (sort === 'rating') return b.rating - a.rating;
      return 0;
    });

  const hotCount = ALL_PRODUCTS.filter(p => p.hot).length;
  const avgDiscount = Math.round(ALL_PRODUCTS.reduce((s, p) => s + p.discount, 0) / ALL_PRODUCTS.length);

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', position: 'relative', zIndex: 1 }}>
      <CircuitBackground />
      {/* Header */}
      <header style={{ borderBottom: '1px solid var(--border)', background: 'rgba(8,8,8,0.95)', backdropFilter: 'blur(12px)', position: 'sticky', top: 0, zIndex: 100 }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 64 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <LogoMark size={36} />
            <span style={{ fontSize: 18, fontWeight: 700, letterSpacing: '-0.02em' }}>
              Gulf<span style={{ color: 'var(--green)' }}>Deals</span>
            </span>
            <span style={{ fontSize: 11, background: 'var(--surface3)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 7px', color: 'var(--text3)', fontFamily: 'var(--mono)', marginLeft: 2 }}>🇦🇪 UAE</span>
          </div>

          {/* Search */}
          <div style={{ flex: 1, maxWidth: 400, margin: '0 24px', position: 'relative' }}>
            <Icon name="search" size={15} color="var(--text3)" />
            <input type="text" placeholder="Search laptops, GPUs, CPUs…" value={search} onChange={e => setSearch(e.target.value)}
              style={{ width: '100%', padding: '9px 14px 9px 36px', background: 'var(--surface2)', border: '1.5px solid var(--border)', borderRadius: 9, color: 'var(--text)', fontSize: 14, outline: 'none', position: 'relative' }}
              onFocus={e => e.target.style.borderColor = 'var(--green)'}
              onBlur={e => e.target.style.borderColor = 'var(--border)'}
            />
            <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }}>
              <Icon name="search" size={15} color="var(--text3)" />
            </div>
          </div>

          <button onClick={() => setAlertProduct({ brand: 'All', model: 'New Deals', salePrice: 0, discount: 0 })}
            style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '9px 16px', background: 'var(--green-dim)', border: '1px solid rgba(0,255,136,0.3)', borderRadius: 9, color: 'var(--green)', fontSize: 13, fontWeight: 600 }}>
            <Icon name="bell" size={14} color="var(--green)" /> Get Alerts
          </button>
        </div>
      </header>

      {/* Stats bar */}
      <div style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', position: 'sticky', top: 64, zIndex: 99 }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '10px 24px', display: 'flex', gap: 28, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', gap: 24, flex: 1 }}>
            {[
              { label: 'Active Deals', val: ALL_PRODUCTS.length },
              { label: 'Hot Deals', val: hotCount },
              { label: 'Avg Discount', val: `${avgDiscount}%` },
              { label: 'Retailers', val: Object.keys(RETAILERS).length },
            ].map(s => (
              <div key={s.label} style={{ display: 'flex', gap: 6, alignItems: 'baseline' }}>
                <span style={{ fontSize: 18, fontWeight: 700, color: 'var(--green)', fontFamily: 'var(--mono)' }}>{s.val}</span>
                <span style={{ fontSize: 12, color: 'var(--text3)' }}>{s.label}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>Last updated: {new Date().toLocaleDateString('en-AE', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
        </div>
      </div>

      {/* Category tabs */}
      <div style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', position: 'sticky', top: 106, zIndex: 98 }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 24px', display: 'flex', gap: 4 }}>
          {categories.map(cat => (
            <button key={cat.id} onClick={() => { setCategory(cat.id); setFilters({}); }}
              style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '14px 18px', background: 'none', border: 'none', borderBottom: `2px solid ${category === cat.id ? 'var(--green)' : 'transparent'}`, color: category === cat.id ? 'var(--green)' : 'var(--text2)', fontSize: 14, fontWeight: category === cat.id ? 600 : 400, cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap' }}>
              <Icon name={cat.icon} size={15} color={category === cat.id ? 'var(--green)' : 'var(--text2)'} />
              {cat.label}
              <span style={{ background: category === cat.id ? 'var(--green-dim)' : 'var(--surface3)', border: `1px solid ${category === cat.id ? 'rgba(0,255,136,0.3)' : 'var(--border)'}`, borderRadius: 10, padding: '1px 7px', fontSize: 11, color: category === cat.id ? 'var(--green)' : 'var(--text3)', fontFamily: 'var(--mono)' }}>
                {cat.id === 'all' ? ALL_PRODUCTS.length : ALL_PRODUCTS.filter(p => p.category === cat.id).length}
              </span>
            </button>
          ))}
        </div>
      </div>

      {/* Main content */}
      <main style={{ flex: 1, maxWidth: 1280, margin: '0 auto', padding: '24px', width: '100%', display: 'flex', gap: 24 }}>
        {/* Sidebar */}
        {category !== 'all' && (
          <aside style={{ width: 220, flexShrink: 0 }}>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: '16px 16px 8px', position: 'sticky', top: 88 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, paddingBottom: 12, borderBottom: '1px solid var(--border)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 13, fontWeight: 600 }}>
                  <Icon name="filter" size={13} color="var(--green)" /> Filters
                </div>
                {Object.values(filters).some(v => v?.length > 0) && (
                  <button onClick={() => setFilters({})} style={{ fontSize: 11, color: 'var(--text3)', background: 'none', border: 'none', cursor: 'pointer' }}>Reset</button>
                )}

              <FilterSidebar category={category} filters={filters} onChange={setFilters} onReset={() => setFilters({})} />

          </aside>
        )}

        {/* Deals list */}
        <div style={{ flex: 1, minWidth: 0 }}>
          {/* Sort bar */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ fontSize: 14, color: 'var(--text2)' }}>
              <span style={{ fontWeight: 700, color: 'var(--text)' }}>{filtered.length}</span> deals found
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 12, color: 'var(--text3)' }}>Sort by</span>
              <select value={sort} onChange={e => setSort(e.target.value)}
                style={{ padding: '7px 12px', background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, color: 'var(--text)', fontSize: 13, outline: 'none', cursor: 'pointer' }}>
                {sortOptions.map(o => <option key={o.val} value={o.val}>{o.label}</option>)}

          </div>

          {filtered.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--text3)' }}>
              <Icon name="search" size={40} color="var(--text3)" />
              <p style={{ marginTop: 16, fontSize: 16, fontWeight: 600, color: 'var(--text2)' }}>No deals found</p>
              <p style={{ fontSize: 14, marginTop: 6 }}>Try adjusting filters or search terms</p>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {filtered.map(p => (
                <DealCard key={p.id} product={p} onClick={setSelectedProduct} onAlert={setAlertProduct} dn={dn} vibeCardStyle={vibeCardStyle} isTerm={isTerm} />
              ))}
            </div>
          )}
        </div>
      </main>

      {/* Footer */}
      <footer style={{ borderTop: '1px solid var(--border)', padding: '24px', textAlign: 'center' }}>
        <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <LogoMark size={22} />
            <span style={{ fontWeight: 700, fontSize: 14 }}>Gulf<span style={{ color: 'var(--green)' }}>Deals</span></span>
          </div>
          <div style={{ fontSize: 12, color: 'var(--text3)' }}>
            Prices from Amazon.ae · Noon · Sharaf DG · Emax · Virgin Megastore &nbsp;·&nbsp; Prices include VAT · All prices in AED
          </div>
          <div style={{ fontSize: 12, color: 'var(--text3)' }}>
            © 2026 GulfDeals · <span style={{ color: 'var(--text2)' }}>Affiliate disclosure</span>

      {/* Tweaks Panel */}

        <TweakSection label="Accent Color" />

          onChange={v => setTweak('accent', v)}

          label="Style"
          value={t.vibe}
          options={['minimal','neon','terminal']}
          onChange={v => setTweak('vibe', v)}
        />
        <TweakSection label="Density" />
        <TweakRadio
          label="Spacing"
          value={t.density}
          options={['compact','comfortable','spacious']}
          onChange={v => setTweak('density', v)}

      </TweaksPanel>

      {/* Modals */}
      {selectedProduct && <ProductModal product={selectedProduct} onClose={() => setSelectedProduct(null)} onAlert={p => { setSelectedProduct(null); setAlertProduct(p); }} />}
      {alertProduct && <AlertModal product={alertProduct} onClose={() => setAlertProduct(null)} />}

      <style>{`
        input[type="range"]::-webkit-slider-thumb {
          -webkit-appearance: none;
          width: 16px; height: 16px;
          border-radius: 50%;
          background: var(--green);
          cursor: pointer;
          border: 2px solid #000;
          box-shadow: 0 0 0 3px rgba(0,255,136,0.15);
        }
        select option { background: #1a1a1a; color: #f0f0f0; }
      `}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
