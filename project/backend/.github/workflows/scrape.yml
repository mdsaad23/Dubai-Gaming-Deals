name: GulfDeals Scraper

on:
  schedule:
    # 4× daily: 1am, 7am, 1pm, 7pm UTC = 5am / 11am / 5pm / 11pm UAE (UTC+4)
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:              # manual trigger from GitHub Actions UI
    inputs:
      target:
        description: 'Which scraper to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - amazon
          - noon
          - alerts

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45           # full run (both scrapers + detail pages) can take ~30-40min

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PROXY_HOST:           ${{ secrets.PROXY_HOST }}
      PROXY_PORT:           ${{ secrets.PROXY_PORT }}
      PROXY_USER:           ${{ secrets.PROXY_USER }}
      PROXY_PASS:           ${{ secrets.PROXY_PASS }}
      RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM:          ${{ secrets.RESEND_FROM }}
      TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
      SITE_URL:             ${{ secrets.SITE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: project/backend/requirements.txt

      - name: Install Python dependencies
        working-directory: project/backend
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run scrapers via orchestrator
        working-directory: project/backend/scrapers
        run: |
          TARGET="${{ github.event.inputs.target || 'all' }}"
          case "$TARGET" in
            amazon) python ../run_all.py --amazon ;;
            noon)   python ../run_all.py --noon ;;
            alerts) python ../run_all.py --alerts ;;
            *)      python ../run_all.py ;;
          esac

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: project/backend/*.log
          retention-days: 7
